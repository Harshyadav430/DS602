<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gender Prediction Form</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">
    <div class="container mt-5">
        <div class="row justify-content-center">
            <div class="col-md-6">
                <div class="card shadow">
                    <div class="card-body">
                        <h1 class="card-title text-center mb-4">Gender Prediction Form</h1>

                        <form id="genderForm">
                            <div class="mb-3">
                                <div class="form-check">
                                    <input class="form-check-input" type="checkbox" id="long_hair" name="long_hair"
                                        value="1">
                                    <label class="form-check-label" for="long_hair">Long Hair</label>
                                </div>
                            </div>

                            <div class="mb-3">
                                <label for="forehead_width_cm" class="form-label">Forehead Width (cm)</label>
                                <input type="number" class="form-control" id="forehead_width_cm"
                                    name="forehead_width_cm" step="0.1" min="0" required>
                            </div>

                            <div class="mb-3">
                                <label for="forehead_height_cm" class="form-label">Forehead Height (cm)</label>
                                <input type="number" class="form-control" id="forehead_height_cm"
                                    name="forehead_height_cm" step="0.1" min="0" required>
                            </div>

                            <div class="mb-3">
                                <div class="form-check">
                                    <input class="form-check-input" type="checkbox" id="nose_wide" name="nose_wide"
                                        value="1">
                                    <label class="form-check-label" for="nose_wide">Nose Wide</label>
                                </div>
                            </div>

                            <div class="mb-3">
                                <div class="form-check">
                                    <input class="form-check-input" type="checkbox" id="nose_long" name="nose_long"
                                        value="1">
                                    <label class="form-check-label" for="nose_long">Nose Long</label>
                                </div>
                            </div>

                            <div class="mb-3">
                                <div class="form-check">
                                    <input class="form-check-input" type="checkbox" id="lips_thin" name="lips_thin"
                                        value="1">
                                    <label class="form-check-label" for="lips_thin">Lips Thin</label>
                                </div>
                            </div>

                            <div class="mb-3">
                                <div class="form-check">
                                    <input class="form-check-input" type="checkbox" id="distance_nose_to_lip_long"
                                        name="distance_nose_to_lip_long" value="1">
                                    <label class="form-check-label" for="distance_nose_to_lip_long">Distance Nose to Lip
                                        Long</label>
                                </div>
                            </div>

                            <button type="button" class="btn btn-success w-100" onclick="getGenderPrediction()">Predict
                                Gender</button>
                        </form>

                        <div id="result" class="alert mt-3" style="display: none;"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        function getGenderPrediction() {
            // Get form data
            const formData = {
                long_hair: document.getElementById('long_hair').checked ? 1 : 0,
                forehead_width_cm: parseFloat(document.getElementById('forehead_width_cm').value) || 0,
                forehead_height_cm: parseFloat(document.getElementById('forehead_height_cm').value) || 0,
                nose_wide: document.getElementById('nose_wide').checked ? 1 : 0,
                nose_long: document.getElementById('nose_long').checked ? 1 : 0,
                lips_thin: document.getElementById('lips_thin').checked ? 1 : 0,
                distance_nose_to_lip_long: document.getElementById('distance_nose_to_lip_long').checked ? 1 : 0
            };


            // Predict based on score
            const prediction = predictGender(formData);

            // Display result
            const resultDiv = document.getElementById('result');
            resultDiv.textContent = `Predicted Gender: ${prediction}`;
            resultDiv.className = `alert mt-3 alert-${prediction.toLowerCase() === 'male' ? 'primary' : 'danger'}`;
            resultDiv.style.display = 'block';

            return prediction;
        }

       
function predictGender(obj) {
    // createing the same engineered features used in Python
    const forehead_ratio = obj.forehead_width_cm / obj.forehead_height_cm;
    const facial_feature_sum =
        obj.long_hair + obj.nose_wide + obj.nose_long + obj.lips_thin + obj.distance_nose_to_lip_long;

    const MEAN_forehead_width_cm = 13.18785;
    const STD_forehead_width_cm  = 1.1104401728593938;

    const MEAN_forehead_height_cm = 5.952125;
    const STD_forehead_height_cm  = 0.5418352926628165;

    const MEAN_forehead_ratio = 2.2324363656481294;
    const STD_forehead_ratio  = 0.26403986713438493;

    const MEAN_facial_feature_sum = 2.8595;
    const STD_facial_feature_sum  = 1.667860830525137;
    const z_forehead_width_cm  = (obj.forehead_width_cm  - MEAN_forehead_width_cm)  / STD_forehead_width_cm;
    const z_forehead_height_cm = (obj.forehead_height_cm - MEAN_forehead_height_cm) / STD_forehead_height_cm;
    const z_forehead_ratio     = (forehead_ratio         - MEAN_forehead_ratio)     / STD_forehead_ratio;
    const z_facial_feature_sum = (facial_feature_sum     - MEAN_facial_feature_sum) / STD_facial_feature_sum;

    // One-hot encoding for binary features 
    const long_hair_0 = obj.long_hair === 0 ? 1 : 0;
    const long_hair_1 = obj.long_hair === 1 ? 1 : 0;

    const nose_wide_0 = obj.nose_wide === 0 ? 1 : 0;
    const nose_wide_1 = obj.nose_wide === 1 ? 1 : 0;

    const nose_long_0 = obj.nose_long === 0 ? 1 : 0;
    const nose_long_1 = obj.nose_long === 1 ? 1 : 0;

    const lips_thin_0 = obj.lips_thin === 0 ? 1 : 0;
    const lips_thin_1 = obj.lips_thin === 1 ? 1 : 0;

    const distance_0 = obj.distance_nose_to_lip_long === 0 ? 1 : 0;
    const distance_1 = obj.distance_nose_to_lip_long === 1 ? 1 : 0;

    // computeing the logistic regression score using the learned parameters
    const score =
        0.3588470273784407 + // intercept

        (-0.16405052340297763) * z_forehead_width_cm +
        ( 1.758023815059163  ) * z_forehead_height_cm +
        ( 1.4220830877796058 ) * z_forehead_ratio +
        ( 2.3918710977523467 ) * z_facial_feature_sum +

        ( 0.892360216010032  ) * long_hair_0 + (-0.734851939809107 ) * long_hair_1 +
        (-1.2673775116044275 ) * nose_wide_0 + ( 1.4248857878053527) * nose_wide_1 +
        (-1.0445221433282892 ) * nose_long_0 + ( 1.2020304195292146) * nose_long_1 +
        (-1.1234553627776267 ) * lips_thin_0 + ( 1.2809636389785597) * lips_thin_1 +
        (-1.1091668486979125 ) * distance_0 + ( 1.266675124898839 ) * distance_1;

    // converting score to probability and return label
    const probability_male = sigmoid(score);
    return probability_male >= 0.5 ? 'Male' : 'Female';
        }
        

        function sigmoid(z) {
            return 1 / (1 + Math.exp(-z));
        }
    </script>
</body>

</html>
